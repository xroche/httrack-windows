# Windows build for WinHTTrack (VS2022 v143 + vcpkg).
#
# Fully gating now: the engine ships a modern libhttrack.vcxproj, so the GUI both
# compiles AND links. Build libhttrack from the sibling engine checkout first,
# then WinHTTrack against it, then check the two binaries agree on the CRT.
name: windows-build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # SignPath's GitHub app fetches the artifact and the run's metadata from GitHub's
  # own API rather than trusting the build script, so it has to be able to read them.
  actions: read

jobs:
  # Cheap guard for the rules .gitattributes cannot enforce on its own.
  encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Byte-exact on purpose. The sources are ISO-8859-1 (accented French
      # comments), and grep-family tools treat them as binary and silently match
      # nothing, so a shell-based guard here would never fire.
      - name: Encoding and line endings
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          def tracked(*globs):
              out = subprocess.run(['git', 'ls-files', *globs],
                                   capture_output=True, text=True, check=True).stdout
              return [p for p in out.splitlines() if p]

          LF_ONLY = tracked('*.cpp', '*.h')
          CRLF_ONLY = tracked('*.rc', '*.rc2', '*.def', '*.idl', '*.rgs', '*.sln',
                              '*.vcproj', '*.vcxproj', '*.props', '*.manifest',
                              '*.dsp', '*.dsw', '*.iss')
          bad = []

          # A UTF-8-assuming editor rewrites the Latin-1 bytes to U+FFFD and
          # destroys the text. That is silent in review; fail loudly instead.
          for p in LF_ONLY + CRLF_ONLY:
              if b'\xef\xbf\xbd' in open(p, 'rb').read():
                  bad.append(f'{p}: contains U+FFFD; a UTF-8 tool mangled the Latin-1 text')

          for p in LF_ONLY:
              if b'\r' in open(p, 'rb').read():
                  bad.append(f'{p}: has CRLF, must be LF')

          for p in CRLF_ONLY:
              data = open(p, 'rb').read()
              # Every LF must be part of a CRLF. Checking only "has no CRLF at all"
              # would wave through a mixed-ending file, which is how a stray sed
              # insertion slips in.
              if data.replace(b'\r\n', b'') .count(b'\n'):
                  bad.append(f'{p}: has a bare LF, must be CRLF throughout (Windows tooling input)')

          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print(f'OK: {len(LF_ONLY)} LF sources, {len(CRLF_ONLY)} CRLF tooling files, no mojibake.')
          EOF

  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32]
        configuration: [Release]
    steps:
      # The engine's test scripts are #!/bin/bash and the engine has no .gitattributes,
      # so an autocrlf checkout would rewrite them and bash would die on $'\r'. Files
      # land exactly as stored either way, which is what the Windows tooling wants too.
      - name: Check out with the line endings the repos actually store
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Checkout httrack-windows
        uses: actions/checkout@v4
        with:
          path: httrack-windows

      # $(HttrackRoot) resolves to ..\httrack, so the engine must be the sibling.
      # coucal is the engine's own submodule.
      - name: Checkout httrack engine (sibling)
        uses: actions/checkout@v4
        with:
          repository: xroche/httrack
          path: httrack
          submodules: recursive

      # Located with vswhere rather than microsoft/setup-msbuild. A repo that
      # restricts Actions to GitHub-owned ones kills a third-party action as a
      # startup_failure with no job, no log and no annotation -- nothing tells you
      # why. vswhere ships on the image, so there is nothing to depend on.
      - name: Locate MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vs) { throw 'no Visual Studio with MSBuild found' }
          $dir = Join-Path $vs 'MSBuild\Current\Bin'
          if (-not (Test-Path (Join-Path $dir 'MSBuild.exe'))) { throw "MSBuild.exe is not in $dir" }
          # Add-Content, not Out-File: the latter writes UTF-16LE under Windows
          # PowerShell and would corrupt GITHUB_PATH if this step's shell ever changed.
          Add-Content -Path $env:GITHUB_PATH -Value $dir
          Write-Host "MSBuild: $dir"

      - name: Enable vcpkg MSBuild integration
        shell: pwsh
        run: vcpkg integrate install

      # WinHTTrack links src\$(Platform)\$(Configuration)\libhttrack.lib, so the
      # engine has to be built first.
      - name: Build libhttrack (engine)
        working-directory: httrack
        shell: pwsh
        run: |
          msbuild src\libhttrack.vcxproj `
            /m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=true

      # The command-line httrack.exe ships with the GUI, as it always did -- the old
      # installer swept it up with a wildcard, and enumerating files by hand lost it.
      - name: Build httrack (command line)
        working-directory: httrack
        shell: pwsh
        run: |
          msbuild src\httrack.vcxproj `
            /m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=true

      - name: Build WinHTTrack (compile + link)
        working-directory: httrack-windows
        shell: pwsh
        run: |
          msbuild WinHTTrack\WinHTTrack.vcxproj `
            /m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=true `
            /flp:LogFile=msbuild.log`;Verbosity=normal

      # The one failure this whole toolchain cannot otherwise catch: if the exe
      # and the DLL disagree on the CRT, they link cleanly and then crash at
      # runtime on a cross-heap free. Assert they share the dynamic CRT.
      - name: Check the exe and libhttrack.dll agree on the CRT
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
          $tools = Get-ChildItem "$vs\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $dumpbin = Join-Path $tools.FullName 'bin\Hostx64\x64\dumpbin.exe'

          $exe = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}\WinHTTrack.exe"
          $dll = "httrack\src\${{ matrix.platform }}\${{ matrix.configuration }}\libhttrack.dll"
          # The CLI links the same DLL, so it carries the same cross-heap risk.
          $cli = "httrack\src\${{ matrix.platform }}\${{ matrix.configuration }}\httrack.exe"
          foreach ($f in @($exe, $dll, $cli)) {
            if (-not (Test-Path $f)) { throw "missing $f" }
          }

          function Deps($path) {
            (& $dumpbin /dependents $path) |
              Select-String -Pattern '^\s{4}(\S+\.dll)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.ToLower() }
          }
          # The base CRT DLL only, e.g. vcruntime140.dll. On x64 a C++ module that
          # uses exceptions ALSO imports vcruntime140_1.dll (EH continuation
          # metadata); libhttrack is pure C and does not. Comparing the whole
          # vcruntime set would therefore flag a correct build as a mismatch.
          function BaseCrt($deps) {
            @($deps | Where-Object { $_ -match '^vcruntime\d+\.dll$' } | Sort-Object)
          }
          $exeDeps = Deps $exe
          $dllDeps = Deps $dll
          $cliDeps = Deps $cli
          Write-Host "WinHTTrack.exe  -> $($exeDeps -join ', ')"
          Write-Host "libhttrack.dll  -> $($dllDeps -join ', ')"
          Write-Host "httrack.exe     -> $($cliDeps -join ', ')"

          $fail = @()

          # All must import the shared vcruntime. A static-CRT (/MT) build imports
          # none, which is exactly the mismatch that crashes later.
          foreach ($p in @(@{n='WinHTTrack.exe'; d=$exeDeps}, @{n='libhttrack.dll'; d=$dllDeps},
                           @{n='httrack.exe'; d=$cliDeps})) {
            if (-not (BaseCrt $p.d)) {
              $fail += "$($p.n) imports no vcruntime: it was not built with the dynamic CRT (/MD)"
            }
            # A Release build must never pull the debug CRT.
            $dbg = $p.d | Where-Object { $_ -match '^(vcruntime140d|msvcp140d|ucrtbased)\.dll$' }
            if ($dbg) { $fail += "$($p.n) imports a debug CRT: $($dbg -join ', ')" }
          }

          # And they must agree on the SAME base vcruntime, not two different ones.
          $exeRt = BaseCrt $exeDeps
          $dllRt = BaseCrt $dllDeps
          $cliRt = BaseCrt $cliDeps
          if ("$exeRt" -ne "$dllRt") {
            $fail += "CRT mismatch: exe imports [$exeRt] but libhttrack.dll imports [$dllRt]"
          }
          if ("$cliRt" -ne "$dllRt") {
            $fail += "CRT mismatch: httrack.exe imports [$cliRt] but libhttrack.dll imports [$dllRt]"
          }

          if ($fail) { $fail | ForEach-Object { Write-Host "::error::$_" }; exit 1 }

          # A check nobody has watched fail is not a check. Two controls, because the
          # step makes two distinct claims.
          #
          # The filter: cmd.exe links the old msvcrt, not vcruntime140, so the same
          # test must reject it. Assert the parse produced SOMETHING first -- an empty
          # dependency list is falsy, and would otherwise sail through as "rejected",
          # which is the control passing for the wrong reason.
          $ctl = Deps "$env:SystemRoot\System32\cmd.exe"
          if (-not $ctl) { throw 'negative control is vacuous: dumpbin returned no dependents at all for cmd.exe' }
          if (BaseCrt $ctl) { throw 'negative control failed: cmd.exe appears to import vcruntime, so the filter no longer discriminates' }

          # The comparison: the half that actually guards against the cross-heap crash,
          # and the half cmd.exe never exercises. Two different runtimes must compare
          # unequal, and vcruntime140_1 must not be mistaken for a different runtime.
          if ("$(BaseCrt @('vcruntime140.dll'))" -eq "$(BaseCrt @('vcruntime150.dll'))") {
            throw 'the CRT comparison no longer distinguishes two different runtimes'
          }
          if ("$(BaseCrt @('vcruntime140.dll','vcruntime140_1.dll'))" -ne "$(BaseCrt @('vcruntime140.dll'))") {
            throw 'vcruntime140_1 is being counted as a separate runtime again: a correct x64 build would read as a mismatch'
          }
          Write-Host "CRT check passed: both share [$exeRt]. (controls: filter rejects cmd.exe; comparison discriminates)"

      # An invalid embedded manifest does not fail the build: Windows refuses to
      # start the exe with "side-by-side configuration is incorrect", which only
      # shows up on a user's machine. That shipped once, because mt.exe merges
      # manifest inputs by concatenation and MSBuild was quietly adding its own
      # dpiaware.manifest next to ours, leaving two <dpiAware> elements.
      - name: Validate the embedded manifest
        shell: pwsh
        run: |
          $exe = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}\WinHTTrack.exe"
          $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\mt.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $mt) { throw "mt.exe not found" }
          & $mt.FullName -nologo -inputresource:"$exe;#1" -out:embedded.manifest
          if ($LASTEXITCODE -ne 0) { throw "the exe has no embedded manifest" }

          $txt = Get-Content embedded.manifest -Raw
          try { [xml]$null = $txt } catch { throw "embedded manifest is not well-formed XML: $_" }

          # windowsSettings takes each element at most once; a repeat is what makes
          # the loader reject the whole side-by-side configuration.
          $names = [regex]::Matches($txt, '<(dpiAware|dpiAwareness|longPathAware|heapType)\b') |
                   ForEach-Object { $_.Groups[1].Value }
          $dupes = $names | Group-Object | Where-Object { $_.Count -gt 1 }
          if ($dupes) {
            Write-Host $txt
            throw "embedded manifest repeats: $($dupes.Name -join ', ') -- Windows will refuse to start the app"
          }
          Write-Host "Embedded manifest OK: $($names -join ', ')"

      # Stage a package that actually runs. The OpenSSL and zlib DLLs are NOT
      # beside the exe: the GUI calls neither, so it imports neither, and vcpkg's
      # applocal deploy only copies what the binary it just linked imports. They
      # sit next to libhttrack.dll, which does import them. Take the engine's
      # whole output directory, and assert what has to be there rather than
      # trusting it -- an artifact that looks complete but cannot load is worse
      # than a failed build.
      - name: Stage a runnable package
        shell: pwsh
        run: |
          $bin = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}"
          $eng = "httrack\src\${{ matrix.platform }}\${{ matrix.configuration }}"
          Copy-Item "$eng\*.dll" $bin
          # The command-line httrack ships with the GUI.
          Copy-Item "$eng\httrack.exe" $bin
          # Ship the PDBs: dbghelp resolves function and file:line from them at run time, so
          # without them every frame of a user's crash report reads "unknown". The engine's
          # is a bonus and is not ours to fix, so do not red the build over it.
          Copy-Item "$eng\*.pdb" $bin -ErrorAction SilentlyContinue
          # lang.def is a FILE at the engine root, not inside lang\. The GUI reads it
          # from the app directory at startup and refuses to run without it. The old
          # installer swept it up with a wildcard; enumerating files by hand lost it.
          Copy-Item "httrack\lang.def" $bin
          foreach ($d in @('lang', 'html', 'templates')) {
            Copy-Item "httrack\$d" (Join-Path $bin $d) -Recurse -Force
          }

          # Ask the binaries what they need rather than hardcoding a list. OpenSSL
          # is libssl-3.dll on x86 but libssl-3-x64.dll on x64, so a fixed list is
          # wrong on one leg and rots on both.
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
          $tools = Get-ChildItem "$vs\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $dumpbin = Join-Path $tools.FullName 'bin\Hostx64\x64\dumpbin.exe'
          function Deps($path) {
            (& $dumpbin /dependents $path) |
              Select-String -Pattern '^\s{4}(\S+\.dll)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.ToLower() }
          }
          # Supplied by Windows itself, or by the VC++ redist (see the README below).
          $provided = '^(api-ms-win-|kernel32|user32|advapi32|shell32|comctl32|ole32|oleaut32|ws2_32|winmm|gdi32|ucrtbase|vcruntime|msvcp|mfc)'
          $needed = @(Deps "$bin\WinHTTrack.exe") + @(Deps "$bin\libhttrack.dll") |
            Where-Object { $_ -notmatch $provided } | Sort-Object -Unique
          Write-Host "--- must ship: $($needed -join ', ') ---"
          foreach ($d in $needed) {
            if (-not (Test-Path (Join-Path $bin $d))) { throw "package is missing $d" }
          }
          if (-not (Test-Path (Join-Path $bin 'lang\English.txt'))) {
            throw "package is missing lang/: the GUI would start with no interface strings"
          }
          if (-not (Test-Path (Join-Path $bin 'lang.def'))) {
            throw "package is missing lang.def: the GUI refuses to start without it"
          }
          if (-not (Test-Path (Join-Path $bin 'httrack.exe'))) {
            throw "package is missing httrack.exe: the command-line version ships with the GUI"
          }
          if (-not (Test-Path (Join-Path $bin 'WinHTTrack.pdb'))) {
            throw "package is missing WinHTTrack.pdb: crash reports would name no function"
          }
          if (-not (Test-Path (Join-Path $bin 'libhttrack.pdb'))) {
            Write-Host "::warning::no libhttrack.pdb: engine frames will not resolve"
          }

          # mfc140/vcruntime140/msvcp140 are NOT shipped here; they come from the
          # VC++ redist. Say so, so nobody wonders why a clean box will not run it.
          Set-Content (Join-Path $bin 'README-artifact.txt') @'
          This is a CI build of WinHTTrack, not an installer.

          It needs the Microsoft Visual C++ 2015-2022 redistributable (x64 or x86 to
          match), which supplies mfc140.dll, vcruntime140.dll and msvcp140.dll. Those
          are deliberately not bundled here. Everything else it needs is in this
          folder: libhttrack.dll, OpenSSL, zlib, and lang/.

          httrack.exe is the command-line version, against the same libhttrack.dll.
          '@
          Write-Host "--- package contents ---"
          Get-ChildItem $bin | ForEach-Object { Write-Host "  $($_.Name)" }

      # The engine ships ~90 tests and not one of them has ever run on Windows -- they
      # only run under `make check` on Linux/macOS. These are the offline ones: no
      # network, no server, just httrack.exe driven from PATH. They are the engine's
      # tests, but ours is the binary that ships, and this code has never been executed
      # on this platform.
      - name: Run the engine test suite (offline tests)
        shell: bash
        working-directory: httrack/tests
        run: |
          set -u
          bin="$(cygpath -u "$GITHUB_WORKSPACE")/httrack-windows/WinHTTrack/bin/${{ matrix.platform }}/${{ matrix.configuration }}"
          export PATH="$bin:$PATH"

          # httrack.exe is a native binary, so MSYS rewrites any argument shaped like a
          # POSIX path -- and a URL path is shaped exactly like one. The mime self-test was
          # handed "/a/b.html" and the engine received "C:/Program Files/Git/a/b.html".
          # Switch the rewriting off, and hand the tests a temp dir that is already a Windows
          # path, so nothing needs translating in either direction.
          export MSYS_NO_PATHCONV=1
          export MSYS2_ARG_CONV_EXCL='*'
          export TMPDIR="$(cygpath -m "${RUNNER_TEMP}")"
          echo "TMPDIR=$TMPDIR"
          command -v httrack >/dev/null || { echo "::error::httrack.exe is not on PATH ($bin)"; exit 1; }
          echo "httrack: $(command -v httrack)"

          pass=0; fail=0; skip=0; failed=""
          for t in 00_runnable.test 01_engine-*.test 01_zlib-*.test; do
            rc=0
            bash "$t" >"$t.log" 2>&1 || rc=$?
            case "$rc" in
              0)  pass=$((pass+1)); echo "PASS $t" ;;
              77) skip=$((skip+1)); echo "SKIP $t -- $(tail -n 1 "$t.log")" ;;
              *)  fail=$((fail+1)); failed="$failed $t"
                  echo "FAIL $t (exit $rc)"
                  sed 's/^/      /' "$t.log" | tail -n 25 ;;
            esac
          done
          total=$((pass + fail + skip))
          echo "--- ran=$total pass=$pass fail=$fail skip=$skip ---"

          # A skipped test is not a passing test. Every gate in these scripts exits 77 --
          # no python3, no HTTPS, no codec -- so a suite that quietly degrades to
          # "everything skipped" would otherwise report success having tested nothing.
          [ "$total" -ge 45 ] || { echo "::error::only $total tests were discovered: the glob found nothing"; exit 1; }
          [ "$pass" -ge 40 ] || { echo "::error::only $pass tests actually ran and passed ($skip skipped)"; exit 1; }
          [ "$fail" -eq 0 ]  || { echo "::error::failing tests:$failed"; exit 1; }

      # A 25-line tail cannot tell a real Windows bug from a POSIX assumption in the
      # test. Keep every test's whole output.
      - name: Upload the test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-tests-${{ matrix.platform }}-${{ matrix.configuration }}
          path: httrack/tests/*.log
          if-no-files-found: warn

      # Code signing, 1 of 2: the payload. SignPath signs an Inno installer as an opaque
      # PE and cannot reach the files inside it, so sign these BEFORE ISCC packages them.
      # Dormant until SIGNPATH_ORGANIZATION_ID exists, then tags only: releases need a
      # human to approve each request. See SIGNING.md.
      - name: Collect the binaries to sign
        id: collect
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $bin = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}"
          New-Item -ItemType Directory -Force unsigned | Out-Null
          # OpenSSL and zlib included: vcpkg builds them from source, and an allow-by-
          # publisher policy (WDAC, AppLocker) loads a half-signed package then refuses.
          Copy-Item "$bin\*.exe", "$bin\*.dll" unsigned
          foreach ($f in @('WinHTTrack.exe', 'httrack.exe', 'libhttrack.dll')) {
            if (-not (Test-Path (Join-Path 'unsigned' $f))) { throw "nothing to sign: $f is missing" }
          }
          Get-ChildItem unsigned | ForEach-Object { Write-Host "  will sign $($_.Name)" }

      - name: Upload the unsigned binaries
        id: unsigned-binaries
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries-${{ matrix.platform }}
          path: unsigned/*
          if-no-files-found: error

      - name: Sign the binaries
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: winhttrack
          signing-policy-slug: release-signing
          artifact-configuration-slug: binaries
          github-artifact-id: ${{ steps.unsigned-binaries.outputs.artifact-id }}
          wait-for-completion: true
          # Waits on a human clicking approve in SignPath's UI: give that a morning.
          wait-for-completion-timeout-in-seconds: 14400
          output-artifact-directory: signed

      - name: Put the signed binaries back into the package
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $bin = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}"
          # Assert before overwriting: a request that came back unsigned would otherwise
          # sail on and ship an unsigned installer every later step still calls signed.
          foreach ($f in Get-ChildItem 'signed\*' -Include *.exe, *.dll) {
            $sig = Get-AuthenticodeSignature $f.FullName
            Write-Host "  $($f.Name): $($sig.Status) $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') { throw "$($f.Name) came back $($sig.Status), not Valid" }
          }
          Copy-Item 'signed\*' $bin -Force
          Write-Host "::notice::signed $((Get-ChildItem 'signed\*').Count) binaries"

      # Build the installer, install it, and run the thing. Until now nothing had
      # ever executed: the manifest bug that stopped the exe from starting got
      # through a fully green build, because a compiler cannot tell you whether
      # Windows will load the binary. --version answers that in one exit code.
      - name: Build the installer
        shell: pwsh
        run: |
          $arch = if ('${{ matrix.platform }}' -eq 'x64') { 'x64' } else { 'x86' }

          # Single source of truth for the version: the engine's own header.
          $hg = Get-Content 'httrack\src\htsglobal.h' -Raw
          if ($hg -notmatch '#define\s+HTTRACK_VERSION\s+"([^"]+)"') { throw 'cannot read HTTRACK_VERSION' }
          $ver = $Matches[1]
          Write-Host "version = $ver, arch = $arch"
          "APPVER=$ver" | Out-File -Append $env:GITHUB_ENV
          "SETUPARCH=$arch" | Out-File -Append $env:GITHUB_ENV

          # The VC++ runtime, bundled so a clean machine can actually start the app.
          # vs/17 is the VS2022 line (14.4x). NOT vs/18: the 14.5x redistributable
          # refuses to install on Windows 7, which is still our floor.
          $redist = "$PWD\vc_redist.$arch.exe"
          Invoke-WebRequest "https://aka.ms/vs/17/release/vc_redist.$arch.exe" -OutFile $redist
          if ((Get-Item $redist).Length -lt 1MB) { throw 'vc_redist download looks wrong' }

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress | Out-Null }
          if (-not (Test-Path $iscc)) { throw 'Inno Setup is not available' }

          # ISCC fails if any Source: is missing, so a clean compile also proves the
          # redistributable really is in the package.
          & $iscc /Q `
            "/DArch=$arch" "/DAppVersion=$ver" `
            "/DPayloadDir=$PWD\httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}" `
            "/DEngineDir=$PWD\httrack" `
            "/DGuiDir=$PWD\httrack-windows" `
            "/DRedistFile=$redist" `
            "/DOutDir=$PWD\installer" `
            "httrack-windows\InnoSetup\httrack.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          Get-ChildItem "$PWD\installer" | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)" }

      # Code signing, 2 of 2: the wrapper the user downloads, which is what SmartScreen
      # and UAC judge. Before the smoke test, so that what runs below is what ships.
      - name: Upload the unsigned installer
        id: unsigned-installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-${{ matrix.platform }}
          path: installer/*.exe
          if-no-files-found: error

      - name: Sign the installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: winhttrack
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 14400
          output-artifact-directory: installer

      - name: Check the installer really is signed
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $setup = Get-ChildItem "$PWD\installer\*.exe" | Select-Object -First 1
          $sig = Get-AuthenticodeSignature $setup.FullName
          Write-Host "$($setup.Name): $($sig.Status)"
          Write-Host "  signer:    $($sig.SignerCertificate.Subject)"
          Write-Host "  timestamp: $($sig.TimeStamperCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "the installer is $($sig.Status), not Valid" }
          # SignPath timestamps for us, so nothing here proves it did. A missing counter-
          # signature stays invisible until the cert expires and every installer goes bad.
          if (-not $sig.TimeStamperCertificate) { throw "the signature carries no RFC 3161 timestamp" }
          Write-Host "::notice::$($setup.Name) is signed by $($sig.SignerCertificate.Subject)"

      - name: Install it, run it, uninstall it
        shell: pwsh
        run: |
          $setup = Get-ChildItem "$PWD\installer\*.exe" | Select-Object -First 1
          $dir = 'C:\WinHTTrackTest'

          $p = Start-Process $setup.FullName -Wait -PassThru -ArgumentList `
            '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',"/DIR=$dir","/LOG=$PWD\install.log"
          if ($p.ExitCode -ne 0) { throw "installer exited $($p.ExitCode)" }

          $exe = "$dir\WinHTTrack.exe"
          if (-not (Test-Path $exe)) { throw "installer did not place WinHTTrack.exe" }

          # THE test. A non-zero exit here means the binary does not start: a bad
          # manifest, a DLL that will not resolve, a broken install. All of which
          # a green compile happily allows.
          $p = Start-Process $exe -ArgumentList '--version' -Wait -PassThru `
                 -RedirectStandardOutput "$PWD\version.txt"
          $out = (Get-Content "$PWD\version.txt" -Raw).Trim()
          Write-Host "WinHTTrack.exe --version -> exit=$($p.ExitCode), output='$out'"
          if ($p.ExitCode -ne 0) { throw "WinHTTrack.exe --version exited $($p.ExitCode): it does not start" }
          # Without this, an empty APPVER would make [regex]::Escape('') = '' and
          # `-notmatch ''` false: the version assertion would quietly stop asserting.
          if ([string]::IsNullOrWhiteSpace($env:APPVER)) { throw 'APPVER is unset: the version check would be vacuous' }
          if ($out -notmatch [regex]::Escape($env:APPVER)) { throw "expected version $env:APPVER, got '$out'" }
          # --version only proves the binary LOADS: it exits before any data file is
          # touched. That is exactly why a missing lang.def shipped. --selftest runs
          # the real startup, through LANG_INIT, and exits before showing a window.
          $report = Join-Path $env:TEMP 'WinHTTrack-exception.txt'
          Remove-Item $report -ErrorAction SilentlyContinue
          $p = Start-Process $exe -ArgumentList '--selftest' -Wait -PassThru `
                 -RedirectStandardOutput "$PWD\selftest.txt" -RedirectStandardError "$PWD\selftest.err"
          $so = (Get-Content "$PWD\selftest.txt" -Raw -ErrorAction SilentlyContinue)
          $se = (Get-Content "$PWD\selftest.err" -Raw -ErrorAction SilentlyContinue)
          Write-Host "WinHTTrack.exe --selftest -> exit=$($p.ExitCode)"
          if ($so) { Write-Host "  stdout: $($so.Trim())" }
          if ($se) { Write-Host "  stderr: $($se.Trim())" }
          if ($p.ExitCode -ne 0) { throw "WinHTTrack.exe --selftest exited $($p.ExitCode): the installation is incomplete" }
          if ("$so" -notmatch 'startup ok') { throw "selftest did not report startup ok" }

          # --selftest throws one exception on purpose. A crash report that resolves nothing
          # is indistinguishable from a working one until someone needs it, so assert the
          # whole chain here: first-chance hook -> shipped PDB -> function, file and line.
          if (-not (Test-Path $report)) { throw "no crash report written: the first-chance hook never ran" }
          $trace = Get-Content $report -Raw
          Write-Host "--- crash report ---`n$trace"
          if ($trace -notmatch 'throw site') { throw "report holds the handler stack, not the throw stack" }
          # Anchored past the "throw site" header on purpose: CrashReportLogException is
          # itself called from WinHTTrack.cpp, so an unanchored match would be satisfied by
          # the fallback stack and would still be green with the hook dead.
          if ($trace -notmatch 'throw site\)[\s\S]*WinHTTrack\.cpp:\d+') {
            throw "no file:line on the throw stack: the shipped PDB carries no line info"
          }

          # The CLI is a separate binary against the same DLL: it can be broken while the
          # GUI is fine. -#h prints the version and exits 0.
          $cli = Join-Path $dir 'httrack.exe'
          if (-not (Test-Path $cli)) { throw "the installer did not lay down httrack.exe" }
          $p = Start-Process $cli -ArgumentList '-#h' -Wait -PassThru `
                 -RedirectStandardOutput "$PWD\cli.txt" -RedirectStandardError "$PWD\cli.err"
          $co = (Get-Content "$PWD\cli.txt" -Raw -ErrorAction SilentlyContinue)
          $co1 = ("$co".Trim() -split "\r?\n" | Select-Object -First 1)
          Write-Host "httrack.exe -#h -> exit=$($p.ExitCode), output='$co1'"
          if ($p.ExitCode -ne 0) { throw "httrack.exe -#h exited $($p.ExitCode)" }
          if ($co -notmatch [regex]::Escape($env:APPVER)) {
            throw "httrack.exe reported no version, or the wrong one: expected $env:APPVER"
          }

          Write-Host "::notice::WinHTTrack $env:APPVER installs, starts and runs."

          $unins = Get-ChildItem "$dir\unins*.exe" | Select-Object -First 1
          $p = Start-Process $unins.FullName -Wait -PassThru -ArgumentList '/VERYSILENT','/NORESTART'
          if ($p.ExitCode -ne 0) { throw "uninstaller exited $($p.ExitCode)" }
          Start-Sleep -Seconds 3
          if (Test-Path $exe) { throw "uninstall left WinHTTrack.exe behind" }

      - name: Upload the installer
        uses: actions/upload-artifact@v4
        with:
          name: httrack-setup-${{ matrix.platform }}
          path: installer/*.exe
          if-no-files-found: error

      - name: Upload the runnable build
        uses: actions/upload-artifact@v4
        with:
          name: WinHTTrack-${{ matrix.platform }}-${{ matrix.configuration }}
          path: |
            httrack-windows/WinHTTrack/bin/${{ matrix.platform }}/${{ matrix.configuration }}/**
            !**/*.iobj
            !**/*.ipdb
            !**/*.exp

      - name: Upload MSBuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-${{ matrix.platform }}-${{ matrix.configuration }}
          path: httrack-windows/msbuild.log
          if-no-files-found: ignore
