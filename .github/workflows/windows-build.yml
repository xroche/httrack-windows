# Windows build for WinHTTrack (VS2022 v143 + vcpkg).
#
# Fully gating now: the engine ships a modern libhttrack.vcxproj, so the GUI both
# compiles AND links. Build libhttrack from the sibling engine checkout first,
# then WinHTTrack against it, then check the two binaries agree on the CRT.
name: windows-build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Cheap guard for the rules .gitattributes cannot enforce on its own.
  encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Byte-exact on purpose. The sources are ISO-8859-1 (accented French
      # comments), and grep-family tools treat them as binary and silently match
      # nothing, so a shell-based guard here would never fire.
      - name: Encoding and line endings
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          def tracked(*globs):
              out = subprocess.run(['git', 'ls-files', *globs],
                                   capture_output=True, text=True, check=True).stdout
              return [p for p in out.splitlines() if p]

          LF_ONLY = tracked('*.cpp', '*.h')
          CRLF_ONLY = tracked('*.rc', '*.rc2', '*.def', '*.idl', '*.rgs', '*.sln',
                              '*.vcproj', '*.vcxproj', '*.props', '*.manifest',
                              '*.dsp', '*.dsw')
          bad = []

          # A UTF-8-assuming editor rewrites the Latin-1 bytes to U+FFFD and
          # destroys the text. That is silent in review; fail loudly instead.
          for p in LF_ONLY + CRLF_ONLY:
              if b'\xef\xbf\xbd' in open(p, 'rb').read():
                  bad.append(f'{p}: contains U+FFFD; a UTF-8 tool mangled the Latin-1 text')

          for p in LF_ONLY:
              if b'\r' in open(p, 'rb').read():
                  bad.append(f'{p}: has CRLF, must be LF')

          for p in CRLF_ONLY:
              data = open(p, 'rb').read()
              # Every LF must be part of a CRLF. Checking only "has no CRLF at all"
              # would wave through a mixed-ending file, which is how a stray sed
              # insertion slips in.
              if data.replace(b'\r\n', b'') .count(b'\n'):
                  bad.append(f'{p}: has a bare LF, must be CRLF throughout (Windows tooling input)')

          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print(f'OK: {len(LF_ONLY)} LF sources, {len(CRLF_ONLY)} CRLF tooling files, no mojibake.')
          EOF

  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32]
        configuration: [Release]
    steps:
      - name: Checkout httrack-windows
        uses: actions/checkout@v4
        with:
          path: httrack-windows

      # $(HttrackRoot) resolves to ..\httrack, so the engine must be the sibling.
      # coucal is the engine's own submodule.
      - name: Checkout httrack engine (sibling)
        uses: actions/checkout@v4
        with:
          repository: xroche/httrack
          path: httrack
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Enable vcpkg MSBuild integration
        shell: pwsh
        run: vcpkg integrate install

      # WinHTTrack links src\$(Platform)\$(Configuration)\libhttrack.lib, so the
      # engine has to be built first.
      - name: Build libhttrack (engine)
        working-directory: httrack
        shell: pwsh
        run: |
          msbuild src\libhttrack.vcxproj `
            /m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=true

      - name: Build WinHTTrack (compile + link)
        working-directory: httrack-windows
        shell: pwsh
        run: |
          msbuild WinHTTrack\WinHTTrack.vcxproj `
            /m `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=true `
            /flp:LogFile=msbuild.log`;Verbosity=normal

      # The one failure this whole toolchain cannot otherwise catch: if the exe
      # and the DLL disagree on the CRT, they link cleanly and then crash at
      # runtime on a cross-heap free. Assert they share the dynamic CRT.
      - name: Check the exe and libhttrack.dll agree on the CRT
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $tools = Get-ChildItem "$vs\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $dumpbin = Join-Path $tools.FullName 'bin\Hostx64\x64\dumpbin.exe'

          $exe = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}\WinHTTrack.exe"
          $dll = "httrack\src\${{ matrix.platform }}\${{ matrix.configuration }}\libhttrack.dll"
          foreach ($f in @($exe, $dll)) {
            if (-not (Test-Path $f)) { throw "missing $f" }
          }

          function Deps($path) {
            (& $dumpbin /dependents $path) |
              Select-String -Pattern '^\s{4}(\S+\.dll)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.ToLower() }
          }
          # The base CRT DLL only, e.g. vcruntime140.dll. On x64 a C++ module that
          # uses exceptions ALSO imports vcruntime140_1.dll (EH continuation
          # metadata); libhttrack is pure C and does not. Comparing the whole
          # vcruntime set would therefore flag a correct build as a mismatch.
          function BaseCrt($deps) {
            @($deps | Where-Object { $_ -match '^vcruntime\d+\.dll$' } | Sort-Object)
          }
          $exeDeps = Deps $exe
          $dllDeps = Deps $dll
          Write-Host "WinHTTrack.exe  -> $($exeDeps -join ', ')"
          Write-Host "libhttrack.dll  -> $($dllDeps -join ', ')"

          $fail = @()

          # Both must import the shared vcruntime. A static-CRT (/MT) build imports
          # none, which is exactly the mismatch that crashes later.
          foreach ($p in @(@{n='WinHTTrack.exe'; d=$exeDeps}, @{n='libhttrack.dll'; d=$dllDeps})) {
            if (-not (BaseCrt $p.d)) {
              $fail += "$($p.n) imports no vcruntime: it was not built with the dynamic CRT (/MD)"
            }
            # A Release build must never pull the debug CRT.
            $dbg = $p.d | Where-Object { $_ -match '^(vcruntime140d|msvcp140d|ucrtbased)\.dll$' }
            if ($dbg) { $fail += "$($p.n) imports a debug CRT: $($dbg -join ', ')" }
          }

          # And they must agree on the SAME base vcruntime, not two different ones.
          $exeRt = BaseCrt $exeDeps
          $dllRt = BaseCrt $dllDeps
          if ("$exeRt" -ne "$dllRt") {
            $fail += "CRT mismatch: exe imports [$exeRt] but libhttrack.dll imports [$dllRt]"
          }

          if ($fail) { $fail | ForEach-Object { Write-Host "::error::$_" }; exit 1 }
          Write-Host "CRT check passed: both share [$exeRt]."

      # An invalid embedded manifest does not fail the build: Windows refuses to
      # start the exe with "side-by-side configuration is incorrect", which only
      # shows up on a user's machine. That shipped once, because mt.exe merges
      # manifest inputs by concatenation and MSBuild was quietly adding its own
      # dpiaware.manifest next to ours, leaving two <dpiAware> elements.
      - name: Validate the embedded manifest
        shell: pwsh
        run: |
          $exe = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}\WinHTTrack.exe"
          $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\mt.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $mt) { throw "mt.exe not found" }
          & $mt.FullName -nologo -inputresource:"$exe;#1" -out:embedded.manifest
          if ($LASTEXITCODE -ne 0) { throw "the exe has no embedded manifest" }

          $txt = Get-Content embedded.manifest -Raw
          try { [xml]$null = $txt } catch { throw "embedded manifest is not well-formed XML: $_" }

          # windowsSettings takes each element at most once; a repeat is what makes
          # the loader reject the whole side-by-side configuration.
          $names = [regex]::Matches($txt, '<(dpiAware|dpiAwareness|longPathAware|heapType)\b') |
                   ForEach-Object { $_.Groups[1].Value }
          $dupes = $names | Group-Object | Where-Object { $_.Count -gt 1 }
          if ($dupes) {
            Write-Host $txt
            throw "embedded manifest repeats: $($dupes.Name -join ', ') -- Windows will refuse to start the app"
          }
          Write-Host "Embedded manifest OK: $($names -join ', ')"

      # Stage a package that actually runs. The OpenSSL and zlib DLLs are NOT
      # beside the exe: the GUI calls neither, so it imports neither, and vcpkg's
      # applocal deploy only copies what the binary it just linked imports. They
      # sit next to libhttrack.dll, which does import them. Take the engine's
      # whole output directory, and assert what has to be there rather than
      # trusting it -- an artifact that looks complete but cannot load is worse
      # than a failed build.
      - name: Stage a runnable package
        shell: pwsh
        run: |
          $bin = "httrack-windows\WinHTTrack\bin\${{ matrix.platform }}\${{ matrix.configuration }}"
          $eng = "httrack\src\${{ matrix.platform }}\${{ matrix.configuration }}"
          Copy-Item "$eng\*.dll" $bin
          foreach ($d in @('lang', 'html', 'templates')) {
            Copy-Item "httrack\$d" (Join-Path $bin $d) -Recurse -Force
          }

          # Ask the binaries what they need rather than hardcoding a list. OpenSSL
          # is libssl-3.dll on x86 but libssl-3-x64.dll on x64, so a fixed list is
          # wrong on one leg and rots on both.
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $tools = Get-ChildItem "$vs\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $dumpbin = Join-Path $tools.FullName 'bin\Hostx64\x64\dumpbin.exe'
          function Deps($path) {
            (& $dumpbin /dependents $path) |
              Select-String -Pattern '^\s{4}(\S+\.dll)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.ToLower() }
          }
          # Supplied by Windows itself, or by the VC++ redist (see the README below).
          $provided = '^(api-ms-win-|kernel32|user32|advapi32|shell32|comctl32|ole32|oleaut32|ws2_32|winmm|gdi32|ucrtbase|vcruntime|msvcp|mfc)'
          $needed = @(Deps "$bin\WinHTTrack.exe") + @(Deps "$bin\libhttrack.dll") |
            Where-Object { $_ -notmatch $provided } | Sort-Object -Unique
          Write-Host "--- must ship: $($needed -join ', ') ---"
          foreach ($d in $needed) {
            if (-not (Test-Path (Join-Path $bin $d))) { throw "package is missing $d" }
          }
          if (-not (Test-Path (Join-Path $bin 'lang\English.txt'))) {
            throw "package is missing lang/: the GUI would start with no interface strings"
          }

          # mfc140/vcruntime140/msvcp140 are NOT shipped here; they come from the
          # VC++ redist. Say so, so nobody wonders why a clean box will not run it.
          Set-Content (Join-Path $bin 'README-artifact.txt') @'
          This is a CI build of WinHTTrack, not an installer.

          It needs the Microsoft Visual C++ 2015-2022 redistributable (x64 or x86 to
          match), which supplies mfc140.dll, vcruntime140.dll and msvcp140.dll. Those
          are deliberately not bundled here. Everything else it needs is in this
          folder: libhttrack.dll, OpenSSL, zlib, and lang/.
          '@
          Write-Host "--- package contents ---"
          Get-ChildItem $bin | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload the runnable build
        uses: actions/upload-artifact@v4
        with:
          name: WinHTTrack-${{ matrix.platform }}-${{ matrix.configuration }}
          path: |
            httrack-windows/WinHTTrack/bin/${{ matrix.platform }}/${{ matrix.configuration }}/**
            !**/*.iobj
            !**/*.ipdb
            !**/*.exp

      - name: Upload MSBuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-${{ matrix.platform }}-${{ matrix.configuration }}
          path: httrack-windows/msbuild.log
          if-no-files-found: ignore
